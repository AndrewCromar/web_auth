<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Favicon Test</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: rgba(24, 24, 24);
        }
        .icon {
            width: 100px;
            height: 100px;
            background: rgba(24, 24, 24);
            border: 2px solid rgba(59, 59, 59);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        .icon span {
            color: white;
            font-family: 'Roboto', sans-serif;
            font-size: 60px;
            font-weight: bold;
            line-height: 1;
        }
    </style>
</head>
<body>
    <div class="icon"><span>A</span></div>
</body>
</html>
