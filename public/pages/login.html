<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - andrewcromar.org</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 100px; background: #f9f9f9; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:disabled { background: #ccc; }
        .msg { margin-top: 1rem; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>Login</h2>
    <p>Enter your email to receive a login code.</p>
    <form id="loginForm">
        <input type="email" id="email" placeholder="email@example.com" required>
        <button type="submit" id="btnSubmit">Send Code</button>
    </form>
    <div id="message" class="msg"></div>
</div>

<script>
$('#loginForm').on('submit', function(e) {
    e.preventDefault();
    const email = $('#email').val();
    const $btn = $('#btnSubmit');

    $btn.prop('disabled', true).text('Sending...');
    $('#message').text('');

    $.post('../api/request_code.php', { email: email })
    .done(function(data) {
        if (data.dev_code) {
            alert("Dev Mode: Your login code is " + data.dev_code);
        }

        $('#message').css('color', 'green').text(data.message);
        
        localStorage.setItem('auth_email', email);
        
        setTimeout(() => { 
            const urlParams = new URLSearchParams(window.location.search);
            const redirect = urlParams.get('redirect');
            const verifyUrl = 'verify.html' + (redirect ? '?redirect=' + encodeURIComponent(redirect) : '');
            
            window.location.href = verifyUrl; 
        }, 1500);
    })
    .fail(function(xhr) {
        const err = xhr.responseJSON ? xhr.responseJSON.error : 'An error occurred';
        $('#message').css('color', 'red').text(err);
        $btn.prop('disabled', false).text('Send Code');
    });
});
</script>

</body>
</html>
