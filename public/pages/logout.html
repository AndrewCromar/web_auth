<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Logging Out - andrewcromar.org</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 100px; background: #f9f9f9; text-align: center; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .spinner { margin: 20px auto; border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <h2>Logging Out</h2>
    <div class="spinner"></div>
    <p id="status">Clearing your session...</p>
</div>

<script>
$(document).ready(function() {
    $.post('../api/logout.php')
        .always(function() {
            localStorage.removeItem('auth_email');

            const params = new URLSearchParams(window.location.search);
            const redirectPath = params.get('redirect') || 'login.html';

            $('#status').text('You have been logged out. Redirecting...');

            setTimeout(() => {
                window.location.href = redirectPath;
            }, 1000);
        });
});
</script>

</body>
</html>
