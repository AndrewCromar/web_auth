<link rel="stylesheet" href="../styles/root.css">
<link rel="stylesheet" href="../styles/main.css">
<link rel="stylesheet" href="../styles/forms.css">
<link rel="stylesheet" href="../styles/card.css">
<link rel="stylesheet" href="../styles/spinner.css">

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

<title>Verify Code</title>

<div class="card">
    <h2>Verify Code</h2>
    <p>Sent to <span id="displayEmail" class="email-display">your email</span></p>
    
    <form id="verifyForm">
        <input type="text" id="code" class="code-input" placeholder="000000" maxlength="6" required pattern="\d{6}" inputmode="numeric">
        <button type="submit" id="btnVerify">Verify & Login</button>
    </form>
    <div id="message" class="msg"></div>
</div>

<script src="../scripts/verify.js"></script>
