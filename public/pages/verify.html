<title>AUTH</title>

<div class="content">
    <div class="center-center">
        <div>
            <center>
                <h2>Enter Verification Code </h2>
            </center>
            <p>Sent to <span id="displayEmail" class="email-display">your email</span>.</p>
            <form id="verify_form">
                <input type="text" id="verify_code" class="input_code" placeholder="000000" maxlength="6" required pattern="\d{6}" inputmode="numeric">
                <button type="submit" id="verify_submit">Verify & Login</button>
            </form>
            <div id="output" class="output"></div>
        </div>
    </div>
</div>

<script src="../scripts/verify.js"></script>
